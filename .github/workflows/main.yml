name: Deploy Laravel to AWS EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================================
  # JOB 1: Run Tests
  # ============================================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, bcmath, zip, curl, gd, mysql, pdo_mysql
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets for testing
        run: npm run build

      - name: 📋 Create & configure test environment
        run: |
          cp .env.example .env 2>/dev/null || echo "APP_KEY=" > .env
          grep -q "^APP_KEY=" .env || echo "APP_KEY=" >> .env
          php artisan key:generate --no-interaction --force

          # Verify key was generated
          APP_KEY_VALUE=$(grep "^APP_KEY=" .env | cut -d'=' -f2-)
          [ -z "$APP_KEY_VALUE" ] && echo "❌ APP_KEY is empty!" && exit 1
          echo "✅ APP_KEY verified"

          # Remove any conflicting lines then append test config
          for KEY in APP_ENV APP_DEBUG DB_CONNECTION DB_DATABASE CACHE_DRIVER \
                     SESSION_DRIVER QUEUE_CONNECTION MAIL_MAILER BROADCAST_DRIVER ASSET_URL; do
            sed -i "/^${KEY}=/d" .env
          done

          cat >> .env <<'EOF'
          APP_ENV=testing
          APP_DEBUG=true
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_DRIVER=log
          ASSET_URL=http://localhost
          EOF

          # Create a fallback Vite manifest for testing
          mkdir -p public/build
          [ -f public/build/manifest.json ] || cat > public/build/manifest.json <<'MANIFEST'
          {
            "resources/js/app.js":  { "file": "assets/app.js",  "isEntry": true, "src": "resources/js/app.js" },
            "resources/css/app.css": { "file": "assets/app.css", "src": "resources/css/app.css" }
          }
          MANIFEST

      - name: 🔄 Cache Laravel config
        run: |
          php artisan config:clear
          php artisan config:cache

      - name: ✅ Run Laravel tests
        run: php artisan test

  # ============================================================
  # JOB 2: Deploy to Production
  # ============================================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, bcmath, zip, curl, gd, mysql, pdo_mysql
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build frontend assets
        run: npm run build

      - name: 📤 Upload built assets to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
        run: |
          aws s3 sync public/       s3://laravel-cloud-storage-hotel-1234/public/ --delete --exclude "index.php" || true
          aws s3 sync public/build/ s3://laravel-cloud-storage-hotel-1234/build/  --delete || true

      - name: 📦 Create deployment package
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/testing/*' \
            --exclude='storage/app/public/*' \
            ./ deployment/

          tar -czf laravel-deploy.tar.gz -C deployment .
          echo "✅ Package created: $(ls -lh laravel-deploy.tar.gz)"

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 📤 Copy deployment package to EC2
        run: |
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            laravel-deploy.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/laravel-deploy.tar.gz
          echo "✅ Package uploaded to EC2"

      # -----------------------------------------------------------------
      # Write secrets to EC2 as a standalone env file BEFORE the main
      # deploy script runs. This avoids injecting ${{ secrets.* }} values
      # directly inside a remote shell heredoc, which breaks when the
      # secret contains shell-special characters (+, /, =, &, etc.).
      # -----------------------------------------------------------------
      - name: 🔐 Push secrets to EC2 (safe method)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Use printf + base64 so no special character can break the remote shell
          AWS_KEY_B64=$(printf '%s' "$AWS_ACCESS_KEY_ID"     | base64 -w0)
          AWS_SEC_B64=$(printf '%s' "$AWS_SECRET_ACCESS_KEY" | base64 -w0)
          DB_PASS_B64=$(printf '%s' "$DB_PASSWORD"           | base64 -w0)

          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "printf '%s\n' \
                'AWS_KEY_B64=${AWS_KEY_B64}' \
                'AWS_SEC_B64=${AWS_SEC_B64}' \
                'DB_PASS_B64=${DB_PASS_B64}' \
              > /tmp/deploy_secrets.env"

          echo "✅ Secrets pushed to EC2 securely"

      - name: 🔄 Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            # ----------------------------------------------------------
            # Decode secrets from the env file written in the prior step.
            # This is the ONLY safe way to consume secrets in a heredoc.
            # ----------------------------------------------------------
            source /tmp/deploy_secrets.env
            AWS_ACCESS_KEY_ID=$(echo "$AWS_KEY_B64"  | base64 -d)
            AWS_SECRET_ACCESS_KEY=$(echo "$AWS_SEC_B64" | base64 -d)
            DB_PASSWORD=$(echo "$DB_PASS_B64" | base64 -d)
            rm -f /tmp/deploy_secrets.env   # delete immediately after reading

            APP_DIR="/var/www/laravel"
            TIMESTAMP=$(date +%s)

            echo "🚀 Starting deployment — $(date)"
            echo "==================================="

            # ----------------------------------------------------------
            # Step 1: Verify package
            # ----------------------------------------------------------
            echo "🔍 Step 1: Verifying deployment package..."
            [ -f /tmp/laravel-deploy.tar.gz ] \
              || { echo "❌ Package not found in /tmp!"; ls -la /tmp/; exit 1; }
            echo "✅ Package found: $(ls -lh /tmp/laravel-deploy.tar.gz)"

            # ----------------------------------------------------------
            # Step 2: Maintenance mode
            # ----------------------------------------------------------
            echo "🚧 Step 2: Enabling maintenance mode..."
            [ -f "$APP_DIR/artisan" ] \
              && php "$APP_DIR/artisan" down --retry=60 2>/dev/null \
              || echo "Artisan not found — skipping maintenance mode"

            # ----------------------------------------------------------
            # Step 3: Backup .env + persistent directories
            # ----------------------------------------------------------
            echo "💾 Step 3: Backing up persistent data..."

            [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" /tmp/laravel-env-backup-$TIMESTAMP

            if [ -d "$APP_DIR/storage" ] && [ "$(ls -A "$APP_DIR/storage" 2>/dev/null)" ]; then
              sudo mv "$APP_DIR/storage" /tmp/storage-backup-$TIMESTAMP
            fi

            if [ -d "$APP_DIR/bootstrap/cache" ] \
               && [ "$(ls -A "$APP_DIR/bootstrap/cache" 2>/dev/null | grep -v '.gitignore')" ]; then
              sudo mv "$APP_DIR/bootstrap/cache" /tmp/cache-backup-$TIMESTAMP
            fi

            # ----------------------------------------------------------
            # Step 4: Extract new release
            # ----------------------------------------------------------
            echo "📦 Step 4: Extracting new release..."
            sudo mkdir -p "$APP_DIR"

            # Remove old files but leave .env in place
            sudo find "$APP_DIR" \
              -not -path "$APP_DIR" \
              -not -path "$APP_DIR/.env" \
              -delete 2>/dev/null || true

            sudo tar -xzf /tmp/laravel-deploy.tar.gz \
              -C "$APP_DIR" --overwrite --no-same-owner
            rm -f /tmp/laravel-deploy.tar.gz

            # Restore persistent directories
            [ -d /tmp/storage-backup-$TIMESTAMP ] \
              && sudo rm -rf "$APP_DIR/storage" \
              && sudo mv /tmp/storage-backup-$TIMESTAMP "$APP_DIR/storage"

            [ -d /tmp/cache-backup-$TIMESTAMP ] \
              && sudo rm -rf "$APP_DIR/bootstrap/cache" \
              && sudo mv /tmp/cache-backup-$TIMESTAMP "$APP_DIR/bootstrap/cache"

            echo "✅ Extraction complete"

            # ----------------------------------------------------------
            # Step 5: Restore / create .env
            # ----------------------------------------------------------
            echo "🔧 Step 5: Restoring .env..."
            if [ -f /tmp/laravel-env-backup-$TIMESTAMP ]; then
              cp /tmp/laravel-env-backup-$TIMESTAMP "$APP_DIR/.env"
              rm -f /tmp/laravel-env-backup-$TIMESTAMP
              echo "✅ .env restored from backup"
            elif [ ! -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env.example" "$APP_DIR/.env" 2>/dev/null \
                || echo "APP_KEY=" > "$APP_DIR/.env"
              echo "⚠️  No backup found — created fresh .env"
            fi

            # ----------------------------------------------------------
            # Step 6: Inject secrets into .env
            #   All values come from decoded env vars — no literals in script
            # ----------------------------------------------------------
            echo "☁️  Step 6: Injecting secrets into .env..."
            cd "$APP_DIR"

            for KEY in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_DEFAULT_REGION \
                       AWS_BUCKET AWS_USE_PATH_STYLE_ENDPOINT DB_PASSWORD; do
              sed -i "/^${KEY}=/d" .env
            done

            # Append using printf so values with special chars are written verbatim
            {
              printf 'AWS_ACCESS_KEY_ID=%s\n'        "$AWS_ACCESS_KEY_ID"
              printf 'AWS_SECRET_ACCESS_KEY=%s\n'    "$AWS_SECRET_ACCESS_KEY"
              printf 'AWS_DEFAULT_REGION=%s\n'       "ap-southeast-1"
              printf 'AWS_BUCKET=%s\n'               "laravel-cloud-storage-hotel-1234"
              printf 'AWS_USE_PATH_STYLE_ENDPOINT=%s\n' "false"
              printf 'DB_PASSWORD=%s\n'              "$DB_PASSWORD"
            } >> .env

            echo "✅ Secrets injected"
            echo "   AWS_ACCESS_KEY_ID  : $(grep '^AWS_ACCESS_KEY_ID=' .env | cut -c1-24)..."
            echo "   AWS_DEFAULT_REGION : $(grep '^AWS_DEFAULT_REGION=' .env | cut -d= -f2)"

            # ----------------------------------------------------------
            # Step 7: Composer dependencies
            # ----------------------------------------------------------
            echo "📦 Step 7: Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            # Ensure S3 Flysystem driver is present
            composer show league/flysystem-aws-s3-v3 --quiet 2>/dev/null \
              || composer require league/flysystem-aws-s3-v3 "^3.0" --no-interaction
            echo "✅ Composer ready"

            # ----------------------------------------------------------
            # Step 8: Frontend assets (built in CI, but rebuild if missing)
            # ----------------------------------------------------------
            echo "🎨 Step 8: Verifying / building frontend assets..."
            if [ ! -f public/build/manifest.json ]; then
              echo "manifest.json missing — building now..."

              command -v npm &>/dev/null || {
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
              }

              npm ci --no-audit --no-fund
              npm run build
            fi

            # Final fallback manifest
            if [ ! -f public/build/manifest.json ]; then
              echo "⚠️  Creating fallback manifest..."
              mkdir -p public/build
              cat > public/build/manifest.json <<'MANIFEST'
              {
                "resources/js/app.js":   { "file": "assets/app.js",  "isEntry": true, "src": "resources/js/app.js" },
                "resources/css/app.css": { "file": "assets/app.css", "src": "resources/css/app.css" }
              }
              MANIFEST
            fi
            echo "✅ Frontend assets ready"

            # ----------------------------------------------------------
            # Step 9: App key
            # ----------------------------------------------------------
            echo "🔑 Step 9: Checking application key..."
            APP_KEY_VAL=$(grep '^APP_KEY=' .env | cut -d= -f2-)
            [ -z "$APP_KEY_VAL" ] && php artisan key:generate --force && echo "✅ Key generated" \
              || echo "✅ Key already present"

            # ----------------------------------------------------------
            # Step 10: Database migrations
            # ----------------------------------------------------------
            echo "🗄️  Step 10: Running migrations..."
            php artisan migrate --force || echo "⚠️  Migrations failed — check manually"

            # ----------------------------------------------------------
            # Step 11: Cache config, routes, views
            # ----------------------------------------------------------
            echo "⚙️  Step 11: Caching Laravel config..."
            php artisan config:clear
            php artisan config:cache
            php artisan route:cache  || true
            php artisan view:cache
            echo "✅ Cache rebuilt"

            # ----------------------------------------------------------
            # Step 12: Storage link
            # ----------------------------------------------------------
            echo "🔗 Step 12: Linking storage..."
            rm -rf public/storage
            php artisan storage:link || true

            # ----------------------------------------------------------
            # Step 13: Permissions
            # ----------------------------------------------------------
            echo "🔒 Step 13: Setting permissions..."
            sudo chown -R "$USER":www-data "$APP_DIR"
            sudo chmod -R 755 "$APP_DIR"
            sudo chmod -R 775 "$APP_DIR/storage" "$APP_DIR/bootstrap/cache"
            sudo chown -R www-data:www-data \
              "$APP_DIR/storage" \
              "$APP_DIR/bootstrap/cache" \
              "$APP_DIR/public/build"
            sudo chmod -R 755 "$APP_DIR/public/build"
            echo "✅ Permissions set"

            # ----------------------------------------------------------
            # Step 14: Bring application online
            # ----------------------------------------------------------
            echo "🚀 Step 14: Bringing application online..."
            [ -f storage/framework/down ] \
              && sudo chmod 666 storage/framework/down 2>/dev/null || true

            php artisan up || sudo php artisan up
            echo "✅ Application is online"

            # ----------------------------------------------------------
            # Step 15: Clean up temporary backups
            # ----------------------------------------------------------
            echo "🧹 Step 15: Cleaning up..."
            sudo rm -rf /tmp/storage-backup-* /tmp/cache-backup-* 2>/dev/null || true
            echo "✅ Cleanup done"

            echo "==================================="
            echo "✅ DEPLOYMENT COMPLETE — $(date)"
            echo "==================================="

            # Quick status summary
            php artisan about --only=environment 2>/dev/null || true
          ENDSSH

      - name: 🏥 Health check
        run: |
          echo "⏳ Waiting 15s for app to stabilise..."
          sleep 15

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 http://${{ secrets.EC2_HOST }} || echo "000")
            if [[ "$STATUS" == "200" || "$STATUS" == "302" ]]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/5 — HTTP $STATUS — retrying in 5s..."
            sleep 5
          done

          echo "⚠️  Health check returned HTTP $STATUS after 5 attempts (non-fatal)"

      - name: 💬 Notify success
        if: success()
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "🌐 Live at: http://${{ secrets.EC2_HOST }}"
          echo "🕐 Completed at: $(date)"

      - name: 💬 Notify failure
        if: failure()
        run: |
          echo "❌ DEPLOYMENT FAILED — review the logs above"
          echo ""
          echo "Manual recovery steps:"
          echo "  ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          echo "  cd /var/www/laravel"
          echo "  composer require league/flysystem-aws-s3-v3 \"^3.0\""
          echo "  php artisan config:clear && php artisan config:cache"
          echo "  sudo php artisan up"