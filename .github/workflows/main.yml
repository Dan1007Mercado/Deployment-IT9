name: Deploy Laravel to AWS EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, bcmath, zip, curl, gd, mysql, pdo_mysql

      - name: 📦 Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets
        run: npm run build

      - name: 📋 Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🔄 Clear cache
        run: |
          php artisan config:clear
          php artisan cache:clear

      - name: ✅ Run tests
        run: php artisan test

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets
        run: npm run build

      - name: 📦 Create deployment package
        run: |
          mkdir deployment
          rsync -av \
          --exclude=".git" \
          --exclude=".github" \
          --exclude="node_modules" \
          --exclude="tests" \
          --exclude=".env" \
          ./ deployment/

          cd deployment
          tar -czf ../deploy.tar.gz .

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: 📤 Upload package
        run: |
          scp deploy.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/

      - name: 🚀 Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          APP_DIR=/var/www/laravel

          echo "📂 Moving to app directory"
          cd $APP_DIR

          echo "🔧 Fix permissions BEFORE deployment"
          sudo chown -R $USER:www-data $APP_DIR
          sudo chmod -R 775 storage bootstrap/cache

          echo "🚧 Maintenance mode"
          php artisan down || true

          echo "📦 Extracting new files"
          tar -xzf /tmp/deploy.tar.gz -C $APP_DIR --overwrite

          echo "📦 Installing composer packages"
          composer install --no-dev --optimize-autoloader --no-interaction

          echo "🧹 Clearing caches"
          php artisan optimize:clear

          echo "🔑 Ensure APP_KEY exists"
          if ! grep -q "^APP_KEY=" .env; then
              php artisan key:generate
          fi

          echo "🗄 Running migrations"
          php artisan migrate --force

          echo "⚡ Rebuild caches"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "🔗 Storage link"
          php artisan storage:link || true

          echo "🔧 Fix final permissions"
          sudo chown -R www-data:www-data storage bootstrap/cache
          sudo chmod -R 775 storage bootstrap/cache

          echo "🚀 Application live"
          php artisan up

          rm /tmp/deploy.tar.gz

          echo "✅ Deployment successful"

          EOF

      - name: 🏥 Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }})

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Application healthy"
          else
            echo "⚠️ Health check returned $STATUS"
          fi