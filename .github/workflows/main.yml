name: Deploy Laravel to AWS EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, bcmath, zip, curl, gd, mysql, pdo_mysql
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets for testing
        run: npm run build

      - name: 📋 Create environment file
        run: |
          # Copy example file
          cp .env.example .env || echo "No .env.example found, creating new .env"
          
          # If .env is empty or doesn't have APP_KEY, add it
          if ! grep -q "^APP_KEY=" .env; then
            echo "APP_KEY=" >> .env
          fi
          
          # Generate key (this will work even if APP_KEY line exists but is empty)
          php artisan key:generate --no-interaction --force
          
          echo "✅ APP_KEY generated successfully"

      - name: 📋 Configure testing environment
        run: |
          # Verify APP_KEY was generated successfully
          APP_KEY_VALUE=$(grep "^APP_KEY=" .env | cut -d'=' -f2-)
          if [ -z "$APP_KEY_VALUE" ]; then
            echo "❌ APP_KEY is empty!"
            exit 1
          fi
          
          echo "✅ APP_KEY verified: ${APP_KEY_VALUE:0:20}..."
          
          # Remove existing testing config lines if they exist
          sed -i '/^APP_ENV=/d' .env 2>/dev/null || true
          sed -i '/^APP_DEBUG=/d' .env 2>/dev/null || true
          sed -i '/^DB_CONNECTION=/d' .env 2>/dev/null || true
          sed -i '/^DB_DATABASE=/d' .env 2>/dev/null || true
          sed -i '/^CACHE_DRIVER=/d' .env 2>/dev/null || true
          sed -i '/^SESSION_DRIVER=/d' .env 2>/dev/null || true
          sed -i '/^QUEUE_CONNECTION=/d' .env 2>/dev/null || true
          sed -i '/^MAIL_MAILER=/d' .env 2>/dev/null || true
          sed -i '/^BROADCAST_DRIVER=/d' .env 2>/dev/null || true
          sed -i '/^ASSET_URL=/d' .env 2>/dev/null || true
          
          # Append testing configurations
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env
          echo "CACHE_DRIVER=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "MAIL_MAILER=array" >> .env
          echo "BROADCAST_DRIVER=log" >> .env
          
          # For Vite, we need to set the asset URL or use a fake manifest
          echo "ASSET_URL=http://localhost" >> .env
          
          # Create a fake manifest file for testing if it doesn't exist
          mkdir -p public/build
          if [ ! -f public/build/manifest.json ]; then
            echo '{
              "resources/js/app.js": {
                "file": "assets/app.js",
                "isEntry": true,
                "src": "resources/js/app.js"
              },
              "resources/css/app.css": {
                "file": "assets/app.css",
                "src": "resources/css/app.css"
              }
            }' > public/build/manifest.json
          fi
          
          # Final verification
          echo ""
          echo "📋 Final .env configuration:"
          grep -E "^(APP_KEY|APP_ENV|APP_DEBUG|DB_CONNECTION|CACHE_DRIVER|ASSET_URL)" .env || true

      - name: 🔄 Clear and cache config
        run: |
          php artisan config:clear
          php artisan config:cache

      - name: ✅ Run Laravel tests
        run: php artisan test

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, bcmath, zip, curl, gd, mysql, pdo_mysql
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🎨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets
        run: npm run build

      - name: 📤 Upload assets to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
        run: |
          echo "📤 Uploading assets to S3..."
          aws s3 sync public/ s3://laravel-cloud-storage-hotel-1234/public/ --delete --exclude "index.php" || echo "⚠️ S3 upload failed but continuing..."
          aws s3 sync public/build/ s3://laravel-cloud-storage-hotel-1234/build/ --delete || echo "⚠️ S3 build upload failed but continuing..."
          echo "✅ S3 upload complete"

      - name: 📦 Create deployment package
        run: |
          echo "📦 Creating deployment package..."
          mkdir -p deployment
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='node_modules' \
                    --exclude='tests' \
                    --exclude='.env' \
                    --exclude='.env.*' \
                    --exclude='storage/logs/*' \
                    --exclude='storage/framework/cache/*' \
                    --exclude='storage/framework/sessions/*' \
                    --exclude='storage/framework/testing/*' \
                    --exclude='storage/app/public/*' \
                    ./ deployment/
          cd deployment && tar -czf ../laravel-deploy.tar.gz .
          cd ..
          echo "✅ Deployment package created:"
          ls -lh laravel-deploy.tar.gz

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 📤 Copy files to EC2
        run: |
          echo "📤 Copying deployment package to EC2..."
          
          # Check if local file exists
          if [ ! -f laravel-deploy.tar.gz ]; then
            echo "❌ Local file laravel-deploy.tar.gz not found!"
            exit 1
          fi
          
          echo "✅ Local file found: $(ls -lh laravel-deploy.tar.gz)"
          
          # Copy file to EC2
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 laravel-deploy.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/
          
          if [ $? -eq 0 ]; then
            echo "✅ File copied successfully"
          else
            echo "❌ SCP failed"
            exit 1
          fi
          
          # Verify file exists on EC2
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            if [ -f /tmp/laravel-deploy.tar.gz ]; then
              echo '✅ File verified on EC2:'
              ls -lh /tmp/laravel-deploy.tar.gz
            else
              echo '❌ File not found on EC2 after copy!'
              exit 1
            fi
          "

      - name: 🔄 Deploy on EC2
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            set -e
            
            echo "🚀 Starting deployment..."
            echo "==================================="
            
            # Step 1: Verify deployment package exists
            echo "🔍 Step 1: Checking deployment package..."
            if [ ! -f /tmp/laravel-deploy.tar.gz ]; then
              echo "❌ Deployment package not found in /tmp!"
              echo "Contents of /tmp:"
              ls -la /tmp/
              exit 1
            fi
            echo "✅ Found deployment package:"
            ls -lh /tmp/laravel-deploy.tar.gz
            echo "==================================="
            
            # Step 2: Navigate to application directory
            echo "📁 Step 2: Preparing application directory..."
            if [ ! -d /var/www/laravel ]; then
              echo "Creating application directory..."
              sudo mkdir -p /var/www/laravel
            fi
            cd /var/www/laravel
            echo "Current directory: $(pwd)"
            echo "==================================="
            
            # Step 3: Put application in maintenance mode
            echo "🚧 Step 3: Putting application in maintenance mode..."
            if [ -f artisan ]; then
              php artisan down --retry=60 || echo "Maintenance mode failed, continuing..."
            else
              echo "Artisan not found, skipping maintenance mode"
            fi
            echo "==================================="
            
            # Step 4: Backup .env file if it exists
            echo "💾 Step 4: Backing up configuration..."
            if [ -f .env ]; then
              cp .env .env.backup
              echo "✅ .env file backed up"
            fi
            echo "==================================="
            
            # Step 5: Extract new files while preserving storage
            echo "📦 Step 5: Extracting new files while preserving storage..."
            
            # Create a timestamp for backup
            TIMESTAMP=$(date +%s)
            
            # Backup storage directory if it exists and has files
            if [ -d storage ] && [ "$(ls -A storage 2>/dev/null)" ]; then
              echo "Backing up storage directory..."
              sudo mv storage /tmp/storage-backup-$TIMESTAMP
              BACKUP_CREATED=true
            else
              BACKUP_CREATED=false
            fi
            
            # Backup bootstrap/cache if it exists and has files (except .gitignore)
            if [ -d bootstrap/cache ] && [ "$(ls -A bootstrap/cache 2>/dev/null | grep -v ".gitignore")" ]; then
              echo "Backing up bootstrap/cache directory..."
              sudo mv bootstrap/cache /tmp/cache-backup-$TIMESTAMP
              CACHE_BACKUP_CREATED=true
            else
              CACHE_BACKUP_CREATED=false
            fi
            
            # Remove all other files (with sudo)
            echo "Cleaning up old files..."
            sudo find . -not -path "./.env" -not -path "./.env.backup" -delete 2>/dev/null || true
            
            # Extract the new package with sudo
            echo "Extracting new files with sudo..."
            sudo tar -xzf /tmp/laravel-deploy.tar.gz -C /var/www/laravel --overwrite --no-same-owner
            
            # Restore storage if it was backed up
            if [ "$BACKUP_CREATED" = true ] && [ -d /tmp/storage-backup-$TIMESTAMP ]; then
              echo "Restoring original storage directory..."
              sudo rm -rf storage 2>/dev/null || true
              sudo mv /tmp/storage-backup-$TIMESTAMP storage
            fi
            
            # Restore bootstrap/cache if it was backed up
            if [ "$CACHE_BACKUP_CREATED" = true ] && [ -d /tmp/cache-backup-$TIMESTAMP ]; then
              echo "Restoring original bootstrap/cache directory..."
              sudo rm -rf bootstrap/cache 2>/dev/null || true
              sudo mv /tmp/cache-backup-$TIMESTAMP bootstrap/cache
            fi
            
            # Fix ownership immediately after extraction
            echo "Fixing permissions..."
            sudo chown -R $USER:www-data /var/www/laravel
            sudo chmod -R 755 /var/www/laravel
            sudo chmod -R 775 /var/www/laravel/storage /var/www/laravel/bootstrap/cache
            
            echo "✅ Extraction complete with storage preserved"
            echo "Files extracted:"
            ls -la /var/www/laravel | head -10
            echo "==================================="
            
            # Step 6: Restore .env file
            echo "🔧 Step 6: Restoring configuration..."
            if [ -f .env.backup ] && [ ! -f .env ]; then
              mv .env.backup .env
              echo "✅ .env file restored"
            elif [ ! -f .env ]; then
              echo "⚠️ No .env file found, creating from example..."
              cp .env.example .env 2>/dev/null || echo "APP_KEY=" > .env
            fi
            echo "==================================="
            
            # Step 6.5: Configure AWS credentials in .env (CRITICAL FIX)
            echo "☁️ Step 6.5: Configuring AWS credentials in .env..."
            if [ -f .env ]; then
              # Backup current .env
              cp .env .env.temp
              
              # Remove any existing AWS lines to avoid duplicates
              sed -i '/^AWS_ACCESS_KEY_ID=/d' .env
              sed -i '/^AWS_SECRET_ACCESS_KEY=/d' .env
              sed -i '/^AWS_DEFAULT_REGION=/d' .env
              sed -i '/^AWS_BUCKET=/d' .env
              sed -i '/^AWS_USE_PATH_STYLE_ENDPOINT=/d' .env
              
              # Add AWS credentials from GitHub Secrets
              echo "" >> .env
              echo "# AWS Configuration (added by deployment)" >> .env
              echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
              echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
              echo "AWS_DEFAULT_REGION=ap-southeast-1" >> .env
              echo "AWS_BUCKET=laravel-cloud-storage-hotel-1234" >> .env
              echo "AWS_USE_PATH_STYLE_ENDPOINT=false" >> .env
              
              echo "✅ AWS credentials added to .env"
              
              # Verify they were added
              echo "Current AWS configuration:"
              grep -E "AWS_(ACCESS_KEY_ID|SECRET_ACCESS_KEY|DEFAULT_REGION|BUCKET)=" .env | sed 's/AWS_SECRET_ACCESS_KEY=.*/AWS_SECRET_ACCESS_KEY=********/'
            else
              echo "⚠️ .env file not found, cannot configure AWS"
            fi
            echo "==================================="
            
            # Step 7: Install Composer dependencies
            echo "📦 Step 7: Installing Composer dependencies..."
            if [ -f composer.json ]; then
              composer install --no-dev --optimize-autoloader --no-interaction
              echo "✅ Composer dependencies installed"
            else
              echo "⚠️ composer.json not found"
            fi
            echo "==================================="
            
            # Step 7.5: Ensure AWS S3 Flysystem package is installed
            echo "☁️ Step 7.5: Installing AWS S3 Flysystem package..."
            if [ -f composer.json ]; then
              # Check if the package is already installed
              if ! composer show league/flysystem-aws-s3-v3 --quiet 2>/dev/null; then
                echo "Installing league/flysystem-aws-s3-v3 package..."
                composer require league/flysystem-aws-s3-v3 "^3.0" --no-interaction
                echo "✅ AWS S3 Flysystem package installed"
              else
                echo "✅ AWS S3 Flysystem package already installed"
              fi
            else
              echo "⚠️ composer.json not found, skipping"
            fi
            echo "==================================="
            
            # Step 8: Build frontend assets
            echo "🎨 Step 8: Building frontend assets..."
            if [ -f package.json ]; then
              echo "Installing NPM dependencies..."
              # Check if npm is installed
              if ! command -v npm &> /dev/null; then
                echo "⚠️ npm not found, installing Node.js..."
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
              fi
              
              # Install dependencies and build
              npm ci --no-audit --no-fund || npm install --no-audit --no-fund
              
              echo "Building assets..."
              npm run build || npm run production
              
              # Verify the build was successful
              if [ -f public/build/manifest.json ]; then
                echo "✅ Vite manifest found at public/build/manifest.json"
              else
                echo "⚠️ Vite manifest not found, creating fallback..."
                mkdir -p public/build
                echo '{
                  "resources/js/app.js": {
                    "file": "assets/app.js",
                    "isEntry": true,
                    "src": "resources/js/app.js"
                  },
                  "resources/css/app.css": {
                    "file": "assets/app.css",
                    "src": "resources/css/app.css"
                  }
                }' > public/build/manifest.json
              fi
              
              # Set proper permissions
              sudo chown -R $USER:www-data public/build
              sudo chmod -R 755 public/build
              
              echo "✅ Frontend assets built successfully"
            else
              echo "⚠️ package.json not found, skipping asset build"
            fi
            echo "==================================="
            
            # Step 9: Generate application key
            echo "🔑 Step 9: Checking application key..."
            if [ -f artisan ]; then
              if ! grep -q "^APP_KEY=" .env || [ -z "$(grep "^APP_KEY=" .env | cut -d '=' -f2)" ]; then
                echo "Generating application key..."
                php artisan key:generate --force
              else
                echo "✅ APP_KEY already exists"
              fi
            fi
            echo "==================================="
            
            # Step 10: Run migrations
            echo "🗄️ Step 10: Running database migrations..."
            if [ -f artisan ]; then
              php artisan migrate --force || echo "⚠️ Migrations failed, continuing..."
            fi
            echo "==================================="
            
            # Step 11: Clear config cache to pick up AWS credentials
            echo "🔄 Step 11: Clearing config cache..."
            if [ -f artisan ]; then
              php artisan config:clear
              php artisan config:cache
              echo "✅ Config cache cleared and rebuilt"
            fi
            echo "==================================="
            
            # Step 12: Optimize Laravel
            echo "⚙️ Step 12: Optimizing Laravel..."
            if [ -f artisan ]; then
              php artisan route:cache || true
              php artisan view:cache
              echo "✅ Optimization complete"
            fi
            echo "==================================="
            
            # Step 13: Create storage link
            echo "🔗 Step 13: Creating storage link..."
            if [ -f artisan ]; then
              # Remove existing link if it exists
              rm -rf public/storage
              php artisan storage:link || true
            fi
            echo "==================================="
            
            # Step 14: Final permissions
            echo "🔒 Step 14: Setting final permissions..."
            sudo chown -R www-data:www-data /var/www/laravel/storage /var/www/laravel/bootstrap/cache /var/www/laravel/public/build
            sudo chmod -R 775 /var/www/laravel/storage /var/www/laravel/bootstrap/cache
            sudo chmod -R 755 /var/www/laravel/public/build
            echo "✅ Final permissions set"
            echo "==================================="
            
            # Step 15: Test S3 connection
            echo "☁️ Step 15: Testing S3 connection..."
            if [ -f artisan ]; then
              php artisan tinker --execute="try { \\Illuminate\\Support\\Facades\\Storage::disk(\"s3\")->put(\"test.txt\", \"S3 connection test from deployment at $(date)\"); echo \"✅ S3 connection successful\"; } catch (\\Exception \$e) { echo \"⚠️ S3 connection failed: \" . \$e->getMessage(); }"
            fi
            echo "==================================="
            
            # Step 16: Fix maintenance mode file and bring application back up
            echo "🚀 Step 16: Bringing application online..."
            
            # Fix the maintenance mode file permission if it exists
            if [ -f storage/framework/down ]; then
              echo "Fixing maintenance file permissions..."
              sudo chmod 666 storage/framework/down 2>/dev/null || true
              sudo chown $USER:www-data storage/framework/down 2>/dev/null || true
            fi
            
            # Try to bring app up normally
            if php artisan up; then
              echo "✅ Application brought online successfully"
            else
              echo "Trying with sudo..."
              sudo php artisan up
            fi
            echo "==================================="
            
            # Step 17: Clean up
            echo "🧹 Step 17: Cleaning up..."
            rm -f /tmp/laravel-deploy.tar.gz
            rm -f /var/www/laravel/.env.backup
            rm -f /var/www/laravel/.env.temp
            # Remove any remaining backups
            sudo rm -rf /tmp/storage-backup-* 2>/dev/null || true
            sudo rm -rf /tmp/cache-backup-* 2>/dev/null || true
            echo "✅ Cleanup complete"
            echo "==================================="
            
            echo "✅✅✅ DEPLOYMENT COMPLETED SUCCESSFULLY! ✅✅✅"
            
            # Final verification - check AWS credentials
            echo ""
            echo "📊 Final AWS Configuration:"
            grep -E "AWS_(DEFAULT_REGION|BUCKET)=" .env
            echo "AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:0:4}...${AWS_ACCESS_KEY_ID: -4}"
            
            # Show Laravel status
            if [ -f artisan ]; then
              echo ""
              echo "📊 Application Status:"
              php artisan about --only=environment
            fi
          '

      - name: 🏥 Health check
        run: |
          echo "⏳ Waiting for application to be ready..."
          sleep 15
          
          # Try multiple times
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }} || echo "000")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
              echo "✅ Health check passed! (HTTP $HTTP_STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS - retrying in 5 seconds..."
            sleep 5
          done
          
          echo "⚠️ Health check returned HTTP $HTTP_STATUS after 5 attempts"
          # Don't fail the build, just warn

      - name: 💬 Notify success
        if: success()
        run: |
          echo "✅✅✅ PRODUCTION DEPLOYMENT SUCCESSFUL! ✅✅✅"
          echo "🌐 Application is live at: http://${{ secrets.EC2_HOST }}"
          echo "🚀 Deployment completed at $(date)"

      - name: 💬 Notify failure
        if: failure()
        run: |
          echo "❌❌❌ DEPLOYMENT FAILED! ❌❌❌"
          echo "Please check the logs above for details."
          echo ""
          echo "🆘 Quick fixes to try manually on your EC2 instance:"
          echo "  ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          echo "  cd /var/www/laravel"
          echo "  # Add AWS credentials to .env"
          echo "  echo \"AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}\" >> .env"
          echo "  echo \"AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}\" >> .env"
          echo "  echo \"AWS_DEFAULT_REGION=ap-southeast-1\" >> .env"
          echo "  echo \"AWS_BUCKET=laravel-cloud-storage-hotel-1234\" >> .env"
          echo "  php artisan config:clear"
          echo "  php artisan config:cache"
          echo "  composer require league/flysystem-aws-s3-v3 \"^3.0\""
          echo "  sudo php artisan up"